name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run Frontend Tests
        working-directory: ./frontend
        run: npm test

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Run Backend Tests
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_HOST: ${{ secrets.DB_HOST || secrets.PROD_DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || secrets.PROD_DB_PORT }}
          DB_USER: ${{ secrets.DB_USER || secrets.PROD_DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || secrets.PROD_DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME || secrets.PROD_DB_NAME }}
        run: npm test

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: test
    # DESACTIVADO TEMPORALMENTE: Cambiado a 'if: false' para que no realice deploy automático hasta conectar perfiles de publicación y secretos.
    if: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Backend Production Dependencies
        working-directory: ./backend
        run: npm install --omit=dev

      # Paso requerido por el profesor para las migraciones en la fase de Deploy
      # Si manejas la BD con un script o herramienta, asegúrate de tener el script "migrate" en package.json
      - name: Run Database Migrations
        working-directory: ./backend
        env:
          DB_HOST: ${{ secrets.PROD_DB_HOST }}
          DB_PORT: ${{ secrets.PROD_DB_PORT }}
          DB_USER: ${{ secrets.PROD_DB_USER }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          DB_NAME: ${{ secrets.PROD_DB_NAME }}
        run: |
          echo "Ejecutando migraciones de base de datos para producción..."
          # npm run migrate 
          # Nota: Descomentar y ajustar el comando de arriba si usas un ORM como Sequelize/Prisma, o si tienes un script de migración.

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tu-app-service-name' # TODO: Cambiar por el nombre real de tu App Service
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
